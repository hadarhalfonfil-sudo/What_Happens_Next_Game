<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>רצף תמונות</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;600;700&family=Assistant:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Assistant',sans-serif;background:linear-gradient(160deg,#FFF9EC,#E8F4FD 50%,#F0E8FF);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;direction:rtl;overflow-x:hidden}
.wrap{width:100%;max-width:820px;display:flex;flex-direction:column;gap:14px}

/* ── HEADER ── */
.header{background:#fff;border-radius:24px;padding:14px 20px 12px;box-shadow:0 6px 20px rgba(0,0,0,.1);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:10px}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF,#C77DFF)}
.header-credit{font-size:clamp(9px,2vw,12px);color:#aaa;text-align:right;line-height:1.5;flex-shrink:0;max-width:160px}
.header-center{text-align:center;flex:1}
.header h1{font-family:'Fredoka One',cursive;font-size:clamp(22px,6vw,40px);color:#3a2c6e}
.header p{font-size:clamp(11px,2.8vw,15px);color:#8b7faa;margin-top:4px;font-weight:600}
.header-logo{width:clamp(54px,12vw,80px);height:clamp(54px,12vw,80px);object-fit:contain;flex-shrink:0}

/* ── MENU ── */
#menu-screen{display:flex;flex-direction:column;gap:14px}
.menu-title{text-align:center;font-family:'Fredoka One',cursive;font-size:clamp(16px,4vw,22px);color:#3a2c6e}
.story-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;direction:rtl}
.story-btn{background:#fff;border-radius:18px;padding:14px 10px 12px;border:3px solid #eee;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.1);transition:transform .2s,box-shadow .2s,border-color .2s;text-align:center}
.story-btn:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(0,0,0,.16);border-color:#4D96FF}
.story-btn .thumb{width:100%;aspect-ratio:1/1;border-radius:12px;object-fit:cover;display:block}
.story-btn .sb-emoji{font-size:28px}
.story-btn .sb-name{font-family:'Fredoka One',cursive;font-size:clamp(12px,3vw,15px);color:#3a2c6e}
.btn-all{align-self:center;padding:13px 36px;background:linear-gradient(135deg,#C77DFF,#9B5DE5);color:#fff;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:clamp(15px,4vw,20px);cursor:pointer;box-shadow:0 6px 18px rgba(155,93,229,.35);transition:transform .2s}
.btn-all:hover{transform:translateY(-3px)}

/* ── GAME SCREEN ── */
#game-screen{display:none;flex-direction:column;gap:14px}
.cards-area{background:#fff;border-radius:22px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.09)}
.cards-area h3{text-align:center;font-size:clamp(13px,3vw,16px);color:#8b7faa;margin-bottom:14px;font-weight:700}
.source-cards{display:flex;justify-content:center;gap:10px;flex-wrap:nowrap;width:100%}

.story-card{flex:1;min-width:0;width:0;aspect-ratio:1/1;height:auto;border-radius:16px;background:#fff;box-shadow:0 5px 18px rgba(0,0,0,.14);cursor:grab;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none;transition:transform .2s,box-shadow .2s;border:3px solid #eee;overflow:hidden;position:relative}
.story-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.2)}
.story-card img{width:100%;height:100%;object-fit:cover;border-radius:13px;display:block;pointer-events:none}
.story-card.dragging{transform:rotate(3deg) scale(1.07);box-shadow:0 16px 38px rgba(0,0,0,.22);border-color:#4D96FF;z-index:1000}
.story-card.placed{opacity:.22;cursor:default;pointer-events:none}

.drop-area{background:#fff;border-radius:22px;padding:18px 16px;box-shadow:0 6px 20px rgba(0,0,0,.09)}
.drop-zones{display:flex;justify-content:center;gap:10px;flex-wrap:nowrap;width:100%}
.dz-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0}
.dz-badge{font-family:'Fredoka One',cursive;font-size:clamp(20px,5.5vw,30px);width:clamp(34px,8vw,48px);height:clamp(34px,8vw,48px);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.dz-badge.b1{background:#FF6B6B;color:#fff}
.dz-badge.b2{background:#FFD93D;color:#3a2c6e}
.dz-badge.b3{background:#6BCB77;color:#fff}
.drop-zone{width:100%;aspect-ratio:1/1;height:auto;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:all .25s;position:relative;overflow:hidden;flex-shrink:0}
.drop-zone.e1{border:3.5px dashed #FF6B6B88;background:#fff8f8}
.drop-zone.e2{border:3.5px dashed #FFD93D88;background:#fffbf0}
.drop-zone.e3{border:3.5px dashed #6BCB7788;background:#f4fff6}
.drop-zone.hover{transform:scale(1.06);border-style:solid;border-color:#4D96FF;box-shadow:0 8px 24px rgba(77,150,255,.22)}
.drop-zone.filled{border:3px solid #6BCB77;background:#fff;padding:3px}
.zone-placeholder{font-size:clamp(32px,9vw,50px);opacity:.3;pointer-events:none}

.feedback{border-radius:22px;padding:18px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.1);display:none;animation:pop-in .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop-in{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.success{background:linear-gradient(135deg,#f0fff4,#e8ffe8);display:block}
.feedback.error{background:linear-gradient(135deg,#fff8f0,#fff0e8);display:block}
.feedback .fb-emoji{font-size:52px;margin-bottom:8px}
.feedback h2{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,28px);color:#3a2c6e;margin-bottom:6px}
.feedback p{color:#7b6fa0;font-size:clamp(13px,3.5vw,17px)}
.btn-next{display:inline-block;margin-top:14px;padding:12px 34px;background:linear-gradient(135deg,#6BCB77,#4CAF50);color:#fff;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:clamp(15px,4vw,21px);cursor:pointer;box-shadow:0 6px 18px rgba(107,203,119,.4);transition:transform .2s}
.btn-next:hover{transform:translateY(-3px)}
.btn-menu{display:inline-block;margin-top:10px;margin-right:10px;padding:10px 26px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:clamp(13px,3.5vw,17px);cursor:pointer;transition:transform .2s;box-shadow:0 4px 14px rgba(255,107,107,.35)}
.btn-menu:hover{transform:translateY(-2px);background:linear-gradient(135deg,#ff5252,#ff7043)}

.progress-bar-wrap{height:8px;background:#eee;border-radius:10px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#4D96FF,#C77DFF);border-radius:10px;transition:width .4s}

.win-screen{display:none;text-align:center;background:linear-gradient(135deg,#fff9e6,#e8f8ff);border-radius:22px;padding:40px 20px;box-shadow:0 6px 20px rgba(0,0,0,.1);animation:pop-in .5s cubic-bezier(.175,.885,.32,1.275)}
.win-screen .trophy{font-size:clamp(100px,25vw,160px);display:block;margin-bottom:20px;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.win-screen h1{font-family:'Fredoka One',cursive;font-size:clamp(22px,6vw,38px);color:#3a2c6e}
.win-screen p{font-size:clamp(14px,3.5vw,18px);color:#7b6fa0;margin-top:10px}
.btn-restart{display:inline-block;margin-top:18px;margin-left:10px;padding:12px 34px;background:linear-gradient(135deg,#FFD93D,#FFB347);color:#3a2c6e;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:clamp(15px,4vw,21px);cursor:pointer;box-shadow:0 6px 18px rgba(255,217,61,.5);transition:transform .2s}
.btn-restart:hover{transform:translateY(-3px)}

.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;border-radius:2px;animation:confetti-fall linear forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
#floating-card{position:fixed;pointer-events:none;z-index:9998;transform:rotate(3deg) scale(1.07);box-shadow:0 14px 36px rgba(0,0,0,.22);border-radius:16px;border:3px solid #4D96FF;overflow:hidden;display:none;background:#fff}
</style>
</head>

// ── STATE ──
let queue = [];          // array of story indices to play
let queueIdx = 0;
let zoneContents = [null, null, null];
let dragCardId = null;
let dragFromZone = null;
let winConfettiInterval = null;
const fc = document.getElementById('floating-card');

// ── MENU ──
function buildMenu() {
  const grid = document.getElementById('story-grid');
  grid.innerHTML = '';
  STORIES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'story-btn';
    btn.innerHTML = `<img class="thumb" src="${s.thumb}" alt="${s.name}">
      <span class="sb-emoji">${s.emoji}</span>
      <span class="sb-name">${s.name}</span>`;
    btn.onclick = () => startSingle(i);
    grid.appendChild(btn);
  });
}

function startSingle(idx) {
  queue = [idx]; queueIdx = 0;
  showGame(); initStory();
}

function startAll() {
  queue = STORIES.map((_,i) => i); queueIdx = 0;
  showGame(); initStory();
}

function showGame() {
  clearInterval(winConfettiInterval);
  document.getElementById('menu-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  document.querySelector('.cards-area').style.display = '';
  document.querySelector('.drop-area').style.display = '';
  document.getElementById('win-screen').style.display = 'none';
}

function goMenu() {
  clearInterval(winConfettiInterval);
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.querySelector('.cards-area').style.display = '';
  document.querySelector('.drop-area').style.display = '';
}

// ── INIT STORY ──
function initStory() {
  const storyIdx = queue[queueIdx];
  const story = STORIES[storyIdx];
  zoneContents = [null, null, null];

  // progress
  const pct = queue.length > 1 ? Math.round((queueIdx / queue.length) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';

  // title
  document.getElementById('story-title').textContent = `${story.emoji} ${story.name} – גררו את התמונות למקום הנכון`;

  // source cards – shuffled
  const src = document.getElementById('source-cards');
  src.innerHTML = '';
  shuffle(story.images).forEach(img => src.appendChild(buildCard(img)));

  // reset zones
  [0,1,2].forEach(i => {
    const z = document.getElementById(`zone-${i}`);
    z.innerHTML = '<span class="zone-placeholder">📷</span>';
    z.className = `drop-zone e${i+1}`;
    z.style.pointerEvents = '';
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('win-screen').style.display = 'none';
  attachEvents();
}

// ── CARD BUILDER ──
function buildCard(imgObj, forZone=false) {
  const card = document.createElement('div');
  card.className = 'story-card';
  card.id = 'card-' + imgObj.id;
  card.dataset.correctPos = imgObj.correctPos;
  card.setAttribute('draggable', 'true');
  if (forZone) card.style.cssText = 'width:100%;height:100%;border:none;box-shadow:none;border-radius:13px;pointer-events:auto;cursor:grab;';
  const img = document.createElement('img');
  img.src = imgObj.data;
  card.appendChild(img);
  return card;
}

// ── EVENTS ──
function attachEvents() {
  document.querySelectorAll('#source-cards .story-card, .drop-zone .story-card').forEach(c => {
    c.addEventListener('dragstart', onDragStart);
    c.addEventListener('touchstart', onTouchStart, {passive:false});
  });
  [0,1,2].forEach(i => {
    const z = document.getElementById(`zone-${i}`);
    z.addEventListener('dragover',  e => { e.preventDefault(); z.classList.add('hover'); });
    z.addEventListener('dragleave', () => z.classList.remove('hover'));
    z.addEventListener('drop',      e => { e.preventDefault(); z.classList.remove('hover'); dropTo(dragCardId, i); });
  });
}

function onDragStart(e) {
  dragCardId = e.currentTarget.id.replace('card-','');
  dragFromZone = zoneContents.indexOf(dragCardId);
  if (dragFromZone === -1) dragFromZone = null;
  e.dataTransfer.effectAllowed = 'move';
}

function onTouchStart(e) {
  e.preventDefault();
  const card = e.currentTarget;
  dragCardId = card.id.replace('card-','');
  dragFromZone = zoneContents.indexOf(dragCardId);
  if (dragFromZone === -1) dragFromZone = null;

  const t = e.touches[0], rect = card.getBoundingClientRect();
  const ox = t.clientX - rect.left, oy = t.clientY - rect.top;

  fc.innerHTML = '';
  const cl = card.cloneNode(true);
  cl.style.cssText = 'width:100%;height:100%;border:none;box-shadow:none;pointer-events:none;';
  fc.appendChild(cl);
  fc.style.cssText = `width:${rect.width}px;height:${rect.height}px;left:${t.clientX-ox}px;top:${t.clientY-oy}px;display:block;`;
  card.classList.add('dragging');

  const mv = e2 => {
    e2.preventDefault();
    const t2 = e2.touches[0];
    fc.style.left = (t2.clientX - ox) + 'px';
    fc.style.top  = (t2.clientY - oy) + 'px';
    [0,1,2].forEach(i => document.getElementById(`zone-${i}`).classList.remove('hover'));
    document.elementFromPoint(t2.clientX, t2.clientY)?.closest('.drop-zone')?.classList.add('hover');
  };
  const up = e2 => {
    fc.style.display = 'none';
    document.querySelectorAll('.story-card').forEach(c => c.classList.remove('dragging'));
    [0,1,2].forEach(i => document.getElementById(`zone-${i}`).classList.remove('hover'));
    document.removeEventListener('touchmove', mv);
    document.removeEventListener('touchend',  up);
    const t2 = e2.changedTouches[0];
    const zone = document.elementFromPoint(t2.clientX, t2.clientY)?.closest('.drop-zone');
    if (zone) dropTo(dragCardId, parseInt(zone.dataset.index));
  };
  document.addEventListener('touchmove', mv, {passive:false});
  document.addEventListener('touchend',  up);
}

// ── DROP ──
function dropTo(cardId, zoneIdx) {
  const story  = STORIES[queue[queueIdx]];
  const imgObj = story.images.find(i => i.id === cardId);
  if (!imgObj) return;

  const existing = zoneContents[zoneIdx];

  if (dragFromZone !== null) {
    // card came FROM a zone
    zoneContents[dragFromZone] = null;
    const oldZ = document.getElementById(`zone-${dragFromZone}`);
    if (existing !== null && existing !== cardId) {
      placeInZone(existing, dragFromZone);
    } else {
      oldZ.innerHTML = '<span class="zone-placeholder">📷</span>';
      oldZ.className = `drop-zone e${dragFromZone+1}`;
    }
  } else {
    // card came from source row
    document.getElementById('card-' + cardId)?.classList.add('placed');
    if (existing !== null) {
      document.getElementById('card-' + existing)?.classList.remove('placed');
      zoneContents[zoneIdx] = null;
    }
  }

  placeInZone(cardId, zoneIdx);
  if (zoneContents.every(c => c !== null)) setTimeout(checkAnswer, 300);
}

function placeInZone(cardId, zoneIdx) {
  const story  = STORIES[queue[queueIdx]];
  const imgObj = story.images.find(i => i.id === cardId);
  if (!imgObj) return;
  zoneContents[zoneIdx] = cardId;
  const z = document.getElementById(`zone-${zoneIdx}`);
  z.innerHTML = '';
  z.className = 'drop-zone filled';
  const card = buildCard(imgObj, true);
  z.appendChild(card);
  card.addEventListener('dragstart', onDragStart);
  card.addEventListener('touchstart', onTouchStart, {passive:false});
}

// ── CHECK ──
function checkAnswer() {
  let ok = true;
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('card-' + zoneContents[i]);
    if (!el || parseInt(el.dataset.correctPos) !== i) { ok = false; break; }
  }
  const fb = document.getElementById('feedback');
  if (ok) {
    showConfetti();
    [0,1,2].forEach(i => document.getElementById(`zone-${i}`).style.pointerEvents = 'none');
    fb.className = 'feedback success'; fb.style.display = 'block';
    document.getElementById('fb-emoji').textContent = '🌟';
    document.getElementById('fb-title').textContent = 'כל הכבוד! סידרת נכון!';
    document.getElementById('fb-text').textContent  = '';
    const btn = document.getElementById('btn-next');
    btn.style.display = 'inline-block';
    btn.textContent = queueIdx < queue.length - 1 ? 'הבא ➡️' : 'סיום! 🎉';
  } else {
    fb.className = 'feedback error'; fb.style.display = 'block';
    document.getElementById('fb-emoji').textContent = '🤔';
    document.getElementById('fb-title').textContent = 'לא נכון, נסו שוב!';
    document.getElementById('fb-text').textContent  = 'חשבו על הסדר הנכון!';
    document.getElementById('btn-next').style.display = 'none';
    setTimeout(() => {
      zoneContents = [null, null, null];
      [0,1,2].forEach(i => {
        const z = document.getElementById(`zone-${i}`);
        z.innerHTML = '<span class="zone-placeholder">📷</span>';
        z.className = `drop-zone e${i+1}`;
        z.style.pointerEvents = '';
      });
      document.querySelectorAll('#source-cards .story-card').forEach(c => c.classList.remove('placed'));
      fb.className = 'feedback'; fb.style.display = 'none';
      attachEvents();
    }, 1800);
  }
  fb.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function nextStory() {
  queueIdx++;
  if (queueIdx >= queue.length) {
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('source-cards').innerHTML = '';
    [0,1,2].forEach(i => {
      const z = document.getElementById(`zone-${i}`);
      z.innerHTML = '<span class="zone-placeholder">📷</span>';
      z.className = `drop-zone e${i+1}`;
    });
    document.getElementById('feedback').style.display = 'none';
    document.querySelector('.cards-area').style.display = 'none';
    document.querySelector('.drop-area').style.display = 'none';
    document.getElementById('win-screen').style.display = 'block';
    showConfetti(200);
    winConfettiInterval = setInterval(() => showConfetti(120), 3500);
  } else {
    initStory();
  }
}

function replayQueue() {
  queueIdx = 0;
  document.getElementById('win-screen').style.display = 'none';
  initStory();
}

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function showConfetti(n=80) {
  const cont = document.getElementById('confetti');
  cont.innerHTML = '';
  const cols = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FFB347'];
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${cols[~~(Math.random()*cols.length)]};width:${8+Math.random()*12}px;height:${8+Math.random()*12}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    cont.appendChild(p);
  }
  setTimeout(() => cont.innerHTML='', 4000);
}

// ── INIT ──
buildMenu();
</script>
